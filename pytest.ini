[pytest]
# The repo's real suite lives in tests/ and drives the golden fixtures under */self-test/.
# Those fixture files are inputs, not tests: they carry duplicate module basenames and one
# intentionally-red baseline, so they must never be collected directly. testpaths scopes bare
# `pytest`; norecursedirs also protects `pytest .`.
testpaths = tests
norecursedirs = .* build dist *.egg node_modules venv self-test
addopts = -p no:cacheprovider

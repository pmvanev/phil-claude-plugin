# Validated Jobs-to-be-Done (SSOT)
# Bootstrapped by DISCUSS wave, feature: refactor-tests (2026-07-01)

jobs:
  - id: keep-test-suite-trustworthy
    job_story: >
      When my test suite has accumulated smells after a stretch of feature work,
      I want to systematically clean the test code up to my testing.md standards
      without silently weakening what the tests verify, so I can keep trusting the
      suite as a safety net and stop dreading test maintenance.
    dimensions:
      functional: >
        Bring test code into line with testing.md structure standards — AAA layout,
        intention-revealing names, extracted fixtures/helpers, no duplicated setup.
      emotional: >
        Confidence the cleanup did not quietly gut coverage; relief from test-rot dread.
      social: >
        A test suite teammates can read and trust; being seen as disciplined about
        test quality.
    four_forces:
      push: >
        Test rot accumulates; testing.md is not enforced anywhere; phil:refactor and
        phil:refactor-loop refuse or cannot safely touch tests.
      pull: >
        The same one-command, gated cleanup phil:refactor gives production code —
        but for tests; and (redesign-tests, 2026-07-06) safely fix tests that verify
        the wrong thing — implementation instead of behavior — one approved diff at a time.
      anxiety: >
        (A) A green suite does not prove an assertion was not weakened. (B) The tool
        might touch tests I did not want touched. (C) The tool might make behavior
        changes to my tests I did not sanction.
      habit: >
        Manual test cleanup, or leaving tests to rot; running phil:refactor on
        production code only.
    opportunity_score: not-scored   # single job; highest priority by default
    status: validated
    personas: [tess-test-maintainer]
    features: [refactor-tests, redesign-tests]
    # Forces refinement (DISCUSS, feature redesign-tests, 2026-07-06):
    # refactor-tests owns the assertion-preserving pole (anxiety C = "prevent unsanctioned
    # behavior change"). redesign-tests owns the opposite pole: sanctioned, per-diff-approved
    # behavioral rewrites. For redesign-tests, anxiety C is reframed as "a sanctioned rewrite
    # could still silently narrow coverage" (human-only oracle) — the accepted v1 risk (D7).
    # See docs/feature/redesign-tests/feature-delta.md § Changed Assumptions.

  - id: catch-ux-violations-while-building-ui
    # Registered by DISCUSS wave, feature: ux-standards-rule (2026-07-02)
    job_story: >
      When I'm building or editing a UI and I'm heads-down on behavior, I want the
      plugin to flag concrete UX/usability and accessibility violations and name the
      preferred form, so I can catch defects (missing states, placeholder-as-label,
      color-only status, unlabeled controls, sub-24px targets) before they ship —
      without having to hold all of Nielsen's heuristics and WCAG in my head.
    dimensions:
      functional: >
        Detect usability/accessibility violations in UI code during editing and review,
        cite the specific principle, and name the preferred form.
      emotional: >
        Confidence that obvious UX/a11y defects will not slip through; relief from
        carrying the whole heuristic/WCAG checklist mentally.
      social: >
        Ship UI that teammates and users perceive as usable and accessible; be seen as
        someone whose UI work clears the usability bar by default.
    four_forces:
      push: >
        No automated UX coverage exists; ui.md pushes aesthetics ("wow", premium) but
        nothing owns usability/accessibility; heuristics and WCAG are easy to forget mid-flow.
      pull: >
        The same auto-loaded "flag the violation, name the preferred form" help that
        react.md gives React idioms — but for UX usability and accessibility.
      anxiety: >
        (A) A rule that nags on every judgment call creates noise on dense expert tools.
        (B) It might duplicate or contradict ui.md's aesthetics guidance.
      habit: >
        Manual review, relying on memory, or catching UX defects only in QA/production.
    opportunity_score: not-scored
    status: validated
    personas: [devon-ui-developer]
    features: [ux-standards-rule, mobile-web-standards]
    # Mobile facet refinement (DISCUSS, feature mobile-web-standards, 2026-07-07):
    # The job is unchanged — Devon wants UI defects flagged in-flow — but its surface now
    # explicitly includes MOBILE WEB rendering. Refined dimensions/forces for the mobile facet:
    #   functional (mobile): also detect responsive/touch defects — layout that breaks reflow at
    #     320px CSS width or 400% zoom, orientation-locked views, gesture-only or hover-only
    #     interactions with no single-pointer/visible alternative, and sub-target touch controls.
    #   emotional (mobile): confidence the UI works on the small touch screens most users actually
    #     use, not just the desktop it was built on.
    #   push (mobile): the standards cover mobile only via the 24x24px target line (ux.md); reflow,
    #     zoom, orientation, pointer-gesture and motion-actuation defects have no owner, and ui.md's
    #     aesthetic advice (heavy animation, glassmorphism) implicitly pushes desktop-only polish.
    #   pull (mobile): the same auto-loaded "flag the violation, name the preferred form" help — now
    #     for mobile web — with always-flag items anchored to citable WCAG 2.2 SC.
    #   anxiety (mobile): a mobile tier that false-flags responsive judgment calls (breakpoint counts,
    #     intentional density) would erode trust exactly as the parent's anxiety (A) warned.
    # See docs/feature/mobile-web-standards/feature-delta.md.

  - id: deliver-invisible-work-with-discipline
    # Registered by DISCUSS wave, feature: phil-work (2026-07-13)
    job_story: >
      When I have a chunk of technical work that never surfaces to the end user —
      refactoring, re-architecting, cleanup, a migration, a dependency or performance
      pass — I want the same disciplined, multi-wave, test-backed workflow nwave gives
      user-facing features, so I can carry it through safely and leave a decision trail,
      instead of fighting nwave's user-story frame or doing it ad hoc with one-off
      tactical skills.
    dimensions:
      functional: >
        Take an invisible technical initiative from vague itch to a scoped goal plus a
        preservation contract, to a planned sequence of waves, to execution delegated to
        existing tactical skills, to a documented outcome — with behavior provably preserved.
      emotional: >
        Confidence the change broke nothing (the preservation floor); relief from the
        "is this refactor actually safe / am I done yet?" dread; a feeling of control over
        big, scary re-architectures.
      social: >
        A visible decision/progress trail teammates can follow; being seen as disciplined
        about tech-debt and architecture rather than cowboy-refactoring.
    four_forces:
      push: >
        nwave assumes personas/journeys/user-stories that invisible work does not have;
        the tactical skills (refactor, refactor-loop, review-code) are single-purpose — none
        discuss, plan across waves, or document decisions; so large technical initiatives
        get done ad hoc, or not at all.
      pull: >
        The same wave discipline (discuss → plan → execute → verify → document) nwave
        provides, but framed for a technical goal — a general contractor that sequences and
        gates the tactical skills already in the plugin.
      anxiety: >
        (A) another orchestrator that merely duplicates nwave/tactical skills without adding
        value; (B) ceremony overhead for work that sometimes only needs a quick tactical
        skill; (C) a preservation guarantee that is claimed but not actually enforced.
      habit: >
        Reaching for nwave and wrestling its user-story frame; firing tactical skills one-off
        with no plan and no trail; or doing big refactors by hand and hoping.
    opportunity_score: not-scored   # single new job; priority by default
    status: validated
    personas: [quinn-codebase-steward]
    features: [phil-work]

  - id: prove-qualitative-expectations-with-evidence
    # Registered by DISCUSS wave, feature: edd-loop (2026-07-15)
    job_story: >
      When I've handed building or changing something to AI agents and my intent
      includes qualitative expectations that formal tests can't cheaply assert
      (e.g. "error messages are helpful", "the API feels ergonomic", "the migration
      guide is clear to a newcomer"), I want a disciplined loop that captures those
      expectations, gets EXECUTED evidence they're met, and lets me adjudicate —
      without adding ceremony where my existing engines (nwave, phil:work) already
      prove the checkable ones — so I can trust AI-produced work against my real
      intent instead of reading every line or trusting the AI's narration.
    dimensions:
      functional: >
        Capture expectations in plain language; classify each as engine-checkable
        vs qualitative; OFF-RAMP the checkable ones to nwave (user-facing) or
        phil:work (invisible) unchanged; and for the qualitative residue commission
        or collect EXECUTED evidence produced by someone other than the builder,
        put it to human adjudication, and persist expectations + verdicts as living
        documentation.
      emotional: >
        Confidence the qualitative intent was actually met, not narrated; relief
        from the "the AI says it's fine, but did it really?" (fox-guarding-the-
        henhouse) dread; freedom to delegate to agents without reading everything.
      social: >
        Being seen as someone who ships AI-built work that genuinely meets intent;
        a reviewable expectation-and-evidence trail teammates can trust.
    four_forces:
      push: >
        AI agents produce large volumes of code fast; line-by-line review does not
        scale; the same AI that builds also "verifies" its own work (fox guarding
        the henhouse); qualitative intent gets dropped by formal tests or accepted
        on narration.
      pull: >
        A lightweight expectation -> executed-evidence -> human-adjudication loop
        that REUSES nwave / phil:work for everything checkable and adds a gate ONLY
        for the qualitative residue — the missing third option for the qualitative
        goals phil:work's FRAME currently refuses.
      anxiety: >
        (A) yet another orchestrator that merely duplicates nwave/phil:work — countered
        by the central off-ramp; (B) ceremony on work that did not need it — countered
        by bias-to-off-ramp + a gate that scales to zero when evidence already exists;
        (C) evidence that is narrated, not executed — countered by the executed-artifact
        rule; (D) the builder grading its own homework — countered by separation of
        powers (builder != evidence-producer; human is the final adjudicator).
      habit: >
        Trusting AI narration ("looks good to me"), reading every diff by hand, or
        silently dropping qualitative intent because no test exists for it.
    opportunity_score: not-scored   # single new job; priority by default
    status: validated
    personas: [avery-expectation-owner]
    features: [edd-loop]
    # Relationship to deliver-invisible-work-with-discipline (phil-work): distinct outcome.
    # phil-work's job is PRESERVE behavior through invisible change (preservation floor +
    # checkable goal). This job is PROVE a qualitative expectation is met with executed
    # evidence, and it spans BOTH visible (nwave) and invisible (phil:work) work. phil:edd
    # delegates the build to those engines and inherits their oracle (ADR-005 lineage); it
    # adds only the qualitative-evidence gate they structurally lack.

  - id: get-independent-adversarial-critique-of-completed-work
    # Registered by DISCUSS wave, feature: adversarial-review (2026-07-15)
    job_story: >
      When I (or an AI agent I delegated to) have just completed a task and I'm about to
      trust it, ship it, or call it done, I want an INDEPENDENT adversary to actively try to
      falsify "done" — separating what's hard-checkable from what's a judgment call, attacking
      the output against my intent and standards, and handing me ranked, evidence-bearing
      findings — so I can catch the flaws the builder rationalized past, without either trusting
      the builder's own self-assessment or reading every line myself.
    dimensions:
      functional: >
        An independent reviewer (fresh context, never saw the builder's reasoning trace) takes
        a completed task's output + stated intent, SPLITS hard-checkable claims (verified in
        code / by an available oracle) from soft judgments (adversarially critiqued), attempts a
        falsifying case, and returns a ranked span-and-evidence verdict — advisory, never
        self-adjudicating. Usable standalone, composable into phil:work / phil:edd /
        phil:refactor-tests, and weavable ad-hoc into workflows.
      emotional: >
        Confidence a hostile independent pass hunted for what's wrong before I trusted it;
        relief from "the AI says it's fine, but did anyone actually try to break it?"; freedom
        to delegate without either rubber-stamping or reading everything.
      social: >
        Shipping work that survived an adversarial pass; a "done" that is defensible rather than
        self-certified; being seen as disciplined about independent verification.
    four_forces:
      push: >
        Builders (human or AI) grade their own homework; every existing critic is bound to a
        specific oracle (refactor-loop's suite) or gate (edd's evidence) — there is no general
        adversary you can point at any completed task; soft self-review has correlated-error
        blind spots (the tri-agent trap).
      pull: >
        The refactor-critic generalized out from behind its test oracle — an independent
        adversarial reviewer any command / workflow can call, honest about hard-vs-soft,
        returning ranked findings not a rubber stamp.
      anxiety: >
        (A) an all-soft-critic loop that is just theatre — LLM judging LLM, dressed as a sound
        gate (THE force the design is built against; the central tri-agent warning); (B) nit-noise
        — a reviewer that floods low-value findings; (C) ceremony on work that did not need review;
        (D) same-model / same-context correlated blind spots make the "independent" review not
        actually independent.
      habit: >
        Trusting the builder's self-assessment ("looks good to me"); reading every diff by hand;
        catching flaws only in review / QA / production.
    opportunity_score: not-scored   # single new job; priority by default
    status: validated
    personas: [rowan-skeptical-delegator]
    features: [adversarial-review]
    # Relationship to prove-qualitative-expectations-with-evidence (edd-loop): SIBLING, distinct
    # outcome. edd PRODUCES executed evidence and hands it to a human to adjudicate (producer !=
    # builder; human is the oracle). This job DOES THE JUDGING: an independent critic attacks the
    # output and returns findings/a verdict. edd's deferred agents/edd-evidence-critic is the
    # narrow ancestor; this is the general-purpose form.
    # Load-bearing constraints (DISCUSS, 2026-07-15) — informed by the tri-agent clarification
    # framework (Zhao, KDD '25), read via the harebrain summary
    # docs/research-summaries/tri-agent-clarification (in the sibling `harebrain` repo) + LLM-Modulo/ABC lineage:
    #   C1 INDEPENDENCE: reviewer runs in fresh context and never sees the builder's reasoning
    #      trace (correlated-error avoidance). Different-model hardening deferred to DESIGN.
    #   C2 HARD/SOFT SPLIT: every review partitions findings into hard-checkable (actually run
    #      the check / inherit the host's oracle, ADR-005 lineage) vs soft (adversarial, labeled).
    #   C3 ADVISORY, NEVER SELF-ADJUDICATING: findings are input the host command or human gates
    #      on; the reviewer never declares done.
    #   C4 HONESTY LABEL: when no oracle exists, the review is labeled a soft DRAFT SIGNAL, never
    #      dressed as a sound gate. This is to adversarial-review what the off-ramp is to edd.
    #   C5 SPAN-AND-EVIDENCE / ANTI-FLATTERY: no finding without a span + evidence; empty praise
    #      is coerced to CANNOT_ASSESS (carried from refactor-critic-correctness).
